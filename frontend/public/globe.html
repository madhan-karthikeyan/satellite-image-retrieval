<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Globe View - SatIntel</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Inter", system-ui, sans-serif;
      background: #0a0a0a;
    }

    #cesiumContainer {
      width: 100vw;
      height: 100vh;
    }

    .control-panel {
      position: absolute;
      top: 30px;
      left: 30px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .control-panel h2 {
      margin: 0 0 15px;
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }

    input {
      width: 180px;
      padding: 10px 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #a855f7;
    }

    input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      color: white;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
    }

    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      font-size: 12px;
      color: #22c55e;
      display: none;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      z-index: 1000;
    }

    .error-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .error-overlay h2 {
      color: #ef4444;
      margin-bottom: 10px;
    }

    .error-overlay p {
      color: rgba(255,255,255,0.6);
      max-width: 400px;
    }
  </style>
</head>

<body>

<div id="error-overlay" class="error-overlay" style="display: none;">
  <div>
    <h2>⚠️ Cesium Token Required</h2>
    <p>Please add your Cesium Ion token to the environment variables to enable the interactive globe.</p>
    <p style="margin-top: 15px; font-size: 12px; color: rgba(255,255,255,0.4);">
      Get a free token at: <a href="https://cesium.com/ion/" style="color: #a855f7;">cesium.com/ion</a>
    </p>
  </div>
</div>

<div id="cesiumContainer"></div>

<div class="control-panel">
  <h2>Locate Target</h2>
  <div class="input-group">
    <label>Latitude</label>
    <input id="lat" type="number" step="any" placeholder="e.g. 40.7128" />
  </div>
  <div class="input-group">
    <label>Longitude</label>
    <input id="lon" type="number" step="any" placeholder="e.g. -74.0060" />
  </div>
  <button onclick="goToLocation()">Zoom to Location</button>
  <div id="status" class="status"></div>
</div>

<div class="footer">SatIntel • Interactive Globe</div>

<script>
  const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIwYjQ4NzBjNy0zYmM4LTQzNWMtOWVkOS1iYTBlMzRkMzhkY2MiLCJpZCI6NDA4Mjk5LCJpYXQiOjE3NzQzNDMzMDZ9.RObmxzxlfyMK1Q5vxOZVhmO5W7bQnx8UEObR7PRZe9I';

  if (!CESIUM_TOKEN || CESIUM_TOKEN === 'YOUR_CESIUM_TOKEN') {
    document.getElementById('error-overlay').style.display = 'flex';
  } else {
    Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      homeButton: false,
      fullscreenButton: false,
      selectionIndicator: false,
      infoBox: false
    });

    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyBox.show = true;

    let rotating = true;

    viewer.clock.onTick.addEventListener(function () {
      if (rotating) {
        viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, 0.0005);
      }
    });

    function showStatus(message, isError = false) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.style.display = 'block';
      status.className = isError ? 'status error' : 'status';
      if (!isError) {
        setTimeout(() => { status.style.display = 'none'; }, 3000);
      }
    }

    function goToLocation() {
      const lat = parseFloat(document.getElementById("lat").value);
      const lon = parseFloat(document.getElementById("lon").value);

      if (isNaN(lat) || isNaN(lon) || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        showStatus('Invalid coordinates. Lat: -90 to 90, Lon: -180 to 180', true);
        return;
      }

      rotating = false;
      viewer.entities.removeAll();

      const mainEntity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lon, lat),
        point: {
          pixelSize: 14,
          color: Cesium.Color.CYAN,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 3
        }
      });

      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lon, lat),
        ellipse: {
          semiMajorAxis: 50000,
          semiMinorAxis: 50000,
          material: Cesium.Color.CYAN.withAlpha(0.15),
          outlineColor: Cesium.Color.CYAN.withAlpha(0.3),
          outlineWidth: 1
        }
      });

      viewer.flyTo(mainEntity, {
        duration: 2,
        offset: new Cesium.HeadingPitchRange(
          0,
          Cesium.Math.toRadians(-45),
          50000
        )
      });

      showStatus(`📍 Navigated to ${lat.toFixed(4)}°, ${lon.toFixed(4)}°`);
    }
  }
</script>

</body>
</html>
